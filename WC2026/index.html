<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family World Cup 2026 Bracket Pool</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a1628;
  --bg2: #0d1f3c;
  --bg3: #1a2744;
  --border: #1e3a5f;
  --border2: #2a4a7f;
  --text: #e8eaf6;
  --muted: #64748b;
  --muted2: #94a3b8;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --green: #4ade80;
  --red: #ef4444;
  --yellow: #fbbf24;
  --purple: #7c3aed;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── UTILS ── */
.hidden { display: none !important; }
.text-muted { color: var(--muted); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.tbd { color: var(--muted); font-style: italic; }
input, select, textarea { outline: none; }
input:focus, select:focus { border-color: var(--blue) !important; }

/* ── BUTTONS ── */
.btn {
  padding: 10px 20px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-success { background: #16a34a; color: #fff; }
.btn-danger  { background: #dc2626; color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--muted2); cursor: pointer; border-radius: 6px; padding: 6px 12px; font-size: 12px; }

/* ── LANDING ── */
#landing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 24px;
  padding: 24px;
}
#landing .hero-icon { font-size: 4rem; }
#landing h1 { font-size: 2rem; text-align: center; }
#landing p { color: var(--muted); text-align: center; }
.landing-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}
.landing-input {
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  width: 100%;
}
.landing-input::placeholder { color: var(--muted); }
.admin-toggle {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  padding: 4px;
}
.admin-toggle:hover { color: var(--muted2); }
#landing-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* ── APP SHELL ── */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── BANNERS ── */
.banner {
  padding: 9px 16px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}
.banner-deadline { background: #4c1d95; }
.banner-closed   { background: #7f1d1d; }
.banner-viewing  {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-brand {
  font-weight: 700;
  font-size: 15px;
  margin-right: auto;
}
.nav-btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--muted2);
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-btn:hover  { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: var(--bg3); color: var(--text); }
.nav-user {
  color: var(--muted);
  font-size: 12px;
  margin-left: 8px;
  padding-left: 12px;
  border-left: 1px solid var(--border);
}

/* ── SAVE BAR ── */
#save-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
#save-bar span { font-size: 13px; color: var(--yellow); }

/* ── CONTENT AREA ── */
#content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── BRACKET AREA ── */
#bracket-area {
  flex: 0 0 80%;
  overflow: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
#props-area {
  flex: 0 0 20%;
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  background: var(--bg2);
}

/* ── BRACKET LAYOUT ── */
.bracket-wrap {
  display: flex;
  align-items: flex-start;
  gap: 0;
}
.round-col {
  display: flex;
  flex-direction: column;
  min-width: 190px;
}
.round-label {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0 0 12px;
}
.round-matches {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.match-slot {
  display: flex;
  flex: 1;
  align-items: center;
}

/* connector between rounds */
.connector-col {
  display: flex;
  flex-direction: column;
  width: 28px;
  flex-shrink: 0;
  align-self: stretch;
}
.connector-pair {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.connector-half {
  flex: 1;
  border-right: 1px solid var(--border);
}
.connector-half.top { border-bottom: 1px solid var(--border); }
.connector-half.bot { border-top: 1px solid var(--border); }
.connector-entry {
  flex: 1;
  display: flex;
  align-items: center;
}
.connector-entry-line {
  width: 100%;
  border-top: 1px solid var(--border);
}

/* ── MATCH CARD ── */
.match-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  width: 180px;
  flex-shrink: 0;
}
.match-card.has-result { border-color: var(--border2); }
.match-team {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 10px;
  min-height: 36px;
  transition: background 0.12s;
  user-select: none;
}
.match-team.clickable { cursor: pointer; }
.match-team.clickable:hover { background: #223457; }
.match-team.selected { background: #1a3a6e; }
.match-team.correct { color: var(--green); font-weight: 700; }
.match-team.incorrect { color: var(--muted); text-decoration: line-through; }
.team-flag { font-size: 16px; line-height: 1; flex-shrink: 0; }
.team-name { flex: 1; font-size: 13px; line-height: 1.2; }
.pick-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--blue);
  flex-shrink: 0;
}
.match-divider {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
}
.match-divider-line { flex: 1; height: 1px; background: var(--border); }
.match-score-display {
  font-size: 11px;
  color: var(--muted2);
  font-weight: 600;
  white-space: nowrap;
}
.match-score-input {
  width: 100%;
  padding: 5px 8px;
  font-size: 12px;
  background: var(--bg2);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted2);
  text-align: center;
}
.match-score-input::placeholder { color: var(--muted); }

/* placeholder match (empty) */
.match-card-empty {
  width: 180px;
  height: 80px;
  background: var(--bg3);
  border: 1px dashed var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 12px;
  flex-shrink: 0;
}

/* ── PROPS ── */
.props-header {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.prop-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}
.prop-label {
  font-size: 11px;
  color: var(--muted2);
  margin-bottom: 6px;
  font-weight: 600;
}
.prop-input {
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 13px;
}
.prop-input::placeholder { color: var(--muted); }
.prop-value {
  font-size: 13px;
  color: var(--text);
}
.prop-points-badge {
  display: inline-block;
  background: #78350f;
  color: var(--yellow);
  border-radius: 5px;
  padding: 3px 8px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 8px;
}

/* ── LEADERBOARD ── */
#leaderboard-view {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}
#leaderboard-view h2 { margin-bottom: 20px; font-size: 20px; }
.lb-table {
  width: 100%;
  max-width: 620px;
  border-collapse: collapse;
}
.lb-table th {
  text-align: left;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.lb-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg2);
}
.lb-table tbody tr:hover td { background: var(--bg3); cursor: pointer; }
.lb-rank { color: var(--muted); font-weight: 700; width: 40px; }
.lb-name { font-weight: 600; }
.lb-name .you { color: var(--muted); font-size: 11px; font-weight: 400; margin-left: 6px; }
.lb-pts  { font-weight: 700; color: var(--green); text-align: right; }
.lb-submitted { color: var(--muted); font-size: 12px; }
.lb-locked-msg {
  color: var(--muted);
  font-size: 14px;
  margin-top: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  max-width: 480px;
}

/* ── ADMIN ── */
#admin-view {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}
#admin-view h2 { margin-bottom: 20px; font-size: 20px; }
.admin-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
  max-width: 800px;
}
.admin-section h3 {
  font-size: 15px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.form-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.form-row label {
  font-size: 12px;
  color: var(--muted2);
  width: 90px;
  flex-shrink: 0;
}
.form-input {
  flex: 1;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
}
.form-input::placeholder { color: var(--muted); }
.form-select {
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
}
.form-select option { background: var(--bg3); }
.match-editor-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.match-editor-card h4 {
  font-size: 12px;
  color: var(--muted2);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.round-group-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 16px 0 8px;
}
.sub-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.sub-card h4 { font-size: 14px; margin-bottom: 10px; }
.sub-prop-row {
  font-size: 12px;
  color: var(--muted);
  padding: 3px 0;
}
.sub-prop-row span { color: var(--text); }
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted2);
  cursor: pointer;
}
.checkbox-row input[type=checkbox] { accent-color: var(--blue); width: 14px; height: 14px; }

/* ── THIRD PLACE SECTION ── */
#third-place-wrap {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
#third-place-wrap .third-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<!-- ════════════════════ LANDING ════════════════════ -->
<div id="landing">
  <div class="hero-icon">⚽</div>
  <div style="text-align:center">
    <h1>Family World Cup 2026</h1>
    <p style="margin-top:6px">Bracket Pool Challenge</p>
  </div>
  <div class="landing-form">
    <input class="landing-input" id="name-input" type="text" placeholder="Your name" autocomplete="off" />
    <div id="admin-login-wrap" class="hidden">
      <input class="landing-input" id="passcode-input" type="password" placeholder="Admin passcode" />
    </div>
    <button class="btn btn-primary" onclick="enterApp()">Enter Bracket Pool</button>
    <button class="admin-toggle" onclick="toggleAdminLogin()">Admin login</button>
    <div id="landing-error"></div>
  </div>
</div>

<!-- ════════════════════ APP ════════════════════ -->
<div id="app">
  <!-- Banners -->
  <div id="banner-deadline" class="banner banner-deadline hidden"></div>
  <div id="banner-viewing" class="banner banner-viewing hidden">
    <span>Viewing: <strong id="viewing-name-label"></strong></span>
    <button class="btn-outline" onclick="stopViewing()">← Back to my bracket</button>
  </div>

  <!-- Nav -->
  <nav>
    <span class="nav-brand">⚽ WC2026 Pool</span>
    <button class="nav-btn active" id="nav-bracket" onclick="showView('bracket')">My Bracket</button>
    <button class="nav-btn" id="nav-leaderboard" onclick="showView('leaderboard')">Leaderboard</button>
    <button class="nav-btn hidden" id="nav-admin" onclick="showView('admin')">Admin ⚙️</button>
    <span class="nav-user" id="nav-user-label"></span>
  </nav>

  <!-- Save bar -->
  <div id="save-bar" class="hidden">
    <span>⚠ Unsaved picks</span>
    <button class="btn btn-primary btn-sm" onclick="saveMyPicks()">Save Picks</button>
    <button class="btn-outline" onclick="discardChanges()">Discard</button>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- BRACKET VIEW -->
    <div id="bracket-view" style="display:flex;flex:1;overflow:hidden">
      <div id="bracket-area">
        <div id="bracket-container"></div>
        <div id="third-place-wrap" class="hidden">
          <div class="third-label">3rd Place Match</div>
          <div id="third-place-container"></div>
        </div>
      </div>
      <div id="props-area">
        <div class="props-header">Props</div>
        <div id="props-container"></div>
      </div>
    </div>

    <!-- LEADERBOARD VIEW -->
    <div id="leaderboard-view" class="hidden">
      <h2>Leaderboard</h2>
      <div id="lb-content"></div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" class="hidden">
      <h2>Admin Panel</h2>
      <div id="admin-content"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore,
  doc, setDoc, onSnapshot,
  collection, serverTimestamp, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ════════════════════════════════════════════════
//  FIREBASE CONFIG  ← replace with your project's
// ════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDYnQyHo44KxqDvOVshME31bm_1uYPHc-o",
  authDomain:        "worldcup2026-8708a.firebaseapp.com",
  projectId:         "worldcup2026-8708a",
  storageBucket:     "worldcup2026-8708a.firebasestorage.app",
  messagingSenderId: "905655932448",
  appId:             "1:905655932448:web:4e6beb9a063d2358ecce45"
};

const ADMIN_PASSCODE = "wc2026"; // ← change this before sharing

// ════════════════════════════════════════════════
//  BRACKET STRUCTURE  (fixed 16-team knockout)
// ════════════════════════════════════════════════
const ROUNDS_LAYOUT = [
  { label: 'Round of 16', ids: ['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8'] },
  { label: 'Quarterfinals', ids: ['qf_1','qf_2','qf_3','qf_4'] },
  { label: 'Semifinals', ids: ['sf_1','sf_2'] },
  { label: 'Final', ids: ['final'] }
];

const MATCH_META = {
  r16_1: { round:'R16', label:'Match 1',     next:'qf_1',  nextSlot:'A' },
  r16_2: { round:'R16', label:'Match 2',     next:'qf_1',  nextSlot:'B' },
  r16_3: { round:'R16', label:'Match 3',     next:'qf_2',  nextSlot:'A' },
  r16_4: { round:'R16', label:'Match 4',     next:'qf_2',  nextSlot:'B' },
  r16_5: { round:'R16', label:'Match 5',     next:'qf_3',  nextSlot:'A' },
  r16_6: { round:'R16', label:'Match 6',     next:'qf_3',  nextSlot:'B' },
  r16_7: { round:'R16', label:'Match 7',     next:'qf_4',  nextSlot:'A' },
  r16_8: { round:'R16', label:'Match 8',     next:'qf_4',  nextSlot:'B' },
  qf_1:  { round:'QF',  label:'Quarterfinal 1', next:'sf_1', nextSlot:'A' },
  qf_2:  { round:'QF',  label:'Quarterfinal 2', next:'sf_1', nextSlot:'B' },
  qf_3:  { round:'QF',  label:'Quarterfinal 3', next:'sf_2', nextSlot:'A' },
  qf_4:  { round:'QF',  label:'Quarterfinal 4', next:'sf_2', nextSlot:'B' },
  sf_1:  { round:'SF',  label:'Semifinal 1', next:'final', nextSlot:'A' },
  sf_2:  { round:'SF',  label:'Semifinal 2', next:'final', nextSlot:'B' },
  third: { round:'3RD', label:'3rd Place',   next:null,    nextSlot:null },
  final: { round:'F',   label:'Final',       next:null,    nextSlot:null }
};

const POINTS_BY_ROUND = { R16: 1, QF: 2, SF: 3, '3RD': 1, F: 4 };

const PROP_DEFS = [
  { key:'goldenBall',      label:'🏅 Golden Ball',                  placeholder:'Best player of the tournament', type:'text' },
  { key:'goldenBoot',      label:'👟 Golden Boot',                  placeholder:'Top scorer name',               type:'text' },
  { key:'goldenBootGoals', label:'🥅 Golden Boot Total Goals',      placeholder:'Number (e.g. 7)',                type:'number' },
  { key:'bigTransfer',     label:'💸 Post-Tournament Big Transfer', placeholder:'e.g. Pedri to Real Madrid',      type:'text' },
  { key:'shitTheBed',      label:'💩 Shit the Bed Team',            placeholder:'Biggest disappointment',         type:'text' }
];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let db;
let state = {
  currentUser: null,
  isAdmin: false,
  // live Firestore data
  config:      { deadline: null, published: false },
  bracket:     { matches: [] },
  mySubmission: null,
  allSubmissions: [],
  // viewing another user's bracket
  viewing: null,     // { userName, submission }
  // unsaved edits
  pendingPicks: {},
  pendingProps: {}
};

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deadlinePassed() {
  if (!state.config.deadline) return false;
  const d = state.config.deadline instanceof Timestamp
    ? state.config.deadline.toDate()
    : new Date(state.config.deadline);
  return Date.now() > d.getTime();
}

function canEdit() {
  return !state.viewing && !deadlinePassed();
}

function activePicks() {
  const base = state.viewing
    ? (state.viewing.submission?.picks || {})
    : (state.mySubmission?.picks || {});
  if (state.viewing) return base;
  return { ...base, ...state.pendingPicks };
}

function activeProps() {
  const base = state.viewing
    ? (state.viewing.submission?.props || {})
    : (state.mySubmission?.props || {});
  if (state.viewing) return base;
  return { ...base, ...state.pendingProps };
}

function getMatch(id) {
  return (state.bracket.matches || []).find(m => m.id === id) || null;
}

function teamInfo(slot) {
  if (!slot || slot.type === 'open') return { name: 'TBD', flag: '❓', tbd: true };
  return { name: slot.name || 'TBD', flag: slot.flag || '', tbd: !slot.name };
}

function computeScore(submission) {
  if (!submission) return 0;
  let pts = 0;
  const picks = submission.picks || {};
  for (const m of (state.bracket.matches || [])) {
    if (!m.actualWinner) continue;
    const pick = picks[m.id];
    if (!pick) continue;
    const rnd = MATCH_META[m.id]?.round || 'R16';
    if (pick.winner === m.actualWinner) {
      pts += POINTS_BY_ROUND[rnd] || 1;
      if (pick.score && pick.score.trim() === (m.actualScore || '').trim()) pts += 1;
    }
  }
  pts += Number(submission.propPoints || 0);
  return pts;
}

function hasPending() {
  return Object.keys(state.pendingPicks).length > 0 || Object.keys(state.pendingProps).length > 0;
}

// ════════════════════════════════════════════════
//  FIRESTORE LISTENERS
// ════════════════════════════════════════════════
function setupListeners() {
  onSnapshot(doc(db, 'config', 'main'), snap => {
    state.config = snap.data() || {};
    refreshAll();
  });

  onSnapshot(doc(db, 'bracket', 'main'), snap => {
    state.bracket = snap.data() || { matches: [] };
    refreshAll();
  });

  onSnapshot(doc(db, 'submissions', state.currentUser), snap => {
    state.mySubmission = snap.exists() ? snap.data() : null;
    state.pendingPicks = {};
    state.pendingProps = {};
    refreshAll();
  });

  onSnapshot(collection(db, 'submissions'), snap => {
    state.allSubmissions = snap.docs.map(d => d.data());
    renderLeaderboard();
  });
}

function refreshAll() {
  updateBanners();
  renderBracket();
  renderLeaderboard();
  // Only re-render admin if the panel is not currently visible to the user,
  // so that live Firestore updates don't wipe form fields mid-edit.
  const adminView = document.getElementById('admin-view');
  if (state.isAdmin && adminView && adminView.classList.contains('hidden')) renderAdmin();
}

// ════════════════════════════════════════════════
//  BANNERS & NAV
// ════════════════════════════════════════════════
function updateBanners() {
  const dlBanner = document.getElementById('banner-deadline');
  if (state.config.deadline) {
    const d = state.config.deadline instanceof Timestamp
      ? state.config.deadline.toDate()
      : new Date(state.config.deadline);
    dlBanner.classList.remove('hidden');
    if (deadlinePassed()) {
      dlBanner.className = 'banner banner-closed';
      dlBanner.textContent = 'Submissions are now closed — good luck everyone! 🤞';
    } else {
      dlBanner.className = 'banner banner-deadline';
      dlBanner.textContent = `⏳ Picks close on ${d.toLocaleString()} — save your bracket!`;
    }
  } else {
    dlBanner.classList.add('hidden');
  }

  document.getElementById('save-bar').classList.toggle('hidden', !hasPending() || !canEdit());
}

// ════════════════════════════════════════════════
//  VIEW ROUTING
// ════════════════════════════════════════════════
window.showView = function(view) {
  const views = ['bracket','leaderboard','admin'];
  views.forEach(v => {
    const el = document.getElementById(v + '-view');
    if (el) el.classList.toggle('hidden', v !== view);
    const btn = document.getElementById('nav-' + v);
    if (btn) btn.classList.toggle('active', v === view);
  });
  document.getElementById('bracket-view').style.display = view === 'bracket' ? 'flex' : 'none';
  if (view === 'leaderboard') renderLeaderboard();
  if (view === 'admin') renderAdmin();
};

window.stopViewing = function() {
  state.viewing = null;
  document.getElementById('banner-viewing').classList.add('hidden');
  document.getElementById('nav-bracket').textContent = 'My Bracket';
  updateBanners();
  renderBracket();
  renderProps();
};

function viewOther(userName) {
  const sub = state.allSubmissions.find(s => s.userName === userName);
  if (!sub) return;
  state.viewing = { userName, submission: sub };
  document.getElementById('viewing-name-label').textContent = userName;
  document.getElementById('banner-viewing').classList.remove('hidden');
  document.getElementById('nav-bracket').textContent = `${userName}'s Bracket`;
  showView('bracket');
  renderBracket();
  renderProps();
}

// ════════════════════════════════════════════════
//  BRACKET RENDER
// ════════════════════════════════════════════════
function renderBracket() {
  const picks = activePicks();
  const container = document.getElementById('bracket-container');
  if (!container) return;

  let html = '<div class="bracket-wrap">';

  for (let ri = 0; ri < ROUNDS_LAYOUT.length; ri++) {
    const round = ROUNDS_LAYOUT[ri];
    const count = round.ids.length;

    // connector column coming in from left (not for first round)
    if (ri > 0) {
      const prevCount = ROUNDS_LAYOUT[ri - 1].ids.length;
      html += buildConnectorCol(prevCount, count);
    }

    html += `<div class="round-col">`;
    html += `<div class="round-label">${round.label}</div>`;
    html += `<div class="round-matches">`;

    for (const matchId of round.ids) {
      const match = getMatch(matchId);
      html += `<div class="match-slot">${buildMatchCard(matchId, match, picks)}</div>`;
    }

    html += '</div></div>';
  }

  html += '</div>';
  container.innerHTML = html;

  // Third place
  const thirdMatch = getMatch('third');
  const thirdWrap = document.getElementById('third-place-wrap');
  const thirdContainer = document.getElementById('third-place-container');
  const thirdHasTeams = thirdMatch && thirdMatch.teamA && thirdMatch.teamB;
  thirdWrap.classList.toggle('hidden', !thirdHasTeams);
  if (thirdHasTeams) {
    thirdContainer.innerHTML = buildMatchCard('third', thirdMatch, picks);
  }

  renderProps();
  updateBanners();
}

function buildConnectorCol(fromCount, toCount) {
  // fromCount is always 2× toCount in a proper bracket
  // Build pairs: each pair of "from" matches connects to one "to" match
  const pairs = toCount;
  let html = `<div class="connector-col">`;
  for (let i = 0; i < pairs; i++) {
    html += `<div class="connector-pair">
      <div class="connector-half top"></div>
      <div class="connector-half bot"></div>
    </div>`;
  }
  html += '</div>';
  // Then the entry lines going into the right round
  html += `<div class="connector-col">`;
  for (let i = 0; i < toCount; i++) {
    html += `<div class="connector-entry"><div class="connector-entry-line"></div></div>`;
  }
  html += '</div>';
  return html;
}

function buildMatchCard(matchId, match, picks) {
  if (!match) {
    return `<div class="match-card-empty">TBD</div>`;
  }

  const tA = teamInfo(match.teamA);
  const tB = teamInfo(match.teamB);
  const pick = picks[matchId] || {};
  const rnd = MATCH_META[matchId]?.round || 'R16';

  // Grading classes
  let classA = '', classB = '';
  if (match.actualWinner) {
    if (pick.winner === 'A') classA = match.actualWinner === 'A' ? 'correct' : 'incorrect';
    if (pick.winner === 'B') classB = match.actualWinner === 'B' ? 'correct' : 'incorrect';
  }

  // Can user click to pick?
  const bothReady = !tA.tbd && !tB.tbd;
  const clickable = canEdit() && bothReady;
  const selA = pick.winner === 'A' ? 'selected' : '';
  const selB = pick.winner === 'B' ? 'selected' : '';

  const teamClickA = clickable ? `onclick="pickWinner('${matchId}','A')"` : '';
  const teamClickB = clickable ? `onclick="pickWinner('${matchId}','B')"` : '';

  // Score divider
  const scoreText = match.actualScore || '';
  const divider = `<div class="match-divider">
    <div class="match-divider-line"></div>
    ${scoreText ? `<div class="match-score-display">${esc(scoreText)}</div>` : ''}
    <div class="match-divider-line"></div>
  </div>`;

  // Score prediction input (shown only when user has picked a winner & can edit)
  let scoreInput = '';
  if (canEdit() && pick.winner && bothReady) {
    scoreInput = `<input class="match-score-input" type="text"
      value="${esc(pick.score || '')}"
      placeholder="Score? (e.g. 2-1) +1pt"
      oninput="updateScorePick('${matchId}', this.value)" />`;
  } else if (!canEdit() && pick.score) {
    const scoreCorrect = match.actualScore && pick.score.trim() === match.actualScore.trim();
    scoreInput = `<div class="match-score-input" style="font-size:12px;color:${scoreCorrect ? 'var(--green)' : 'var(--muted)'}">
      Your score: ${esc(pick.score)}${scoreCorrect ? ' ✓' : ''}
    </div>`;
  }

  return `<div class="match-card${match.actualWinner ? ' has-result' : ''}">
    <div class="match-team ${classA} ${selA} ${clickable ? 'clickable' : ''}" ${teamClickA}>
      <span class="team-flag">${tA.flag}</span>
      <span class="team-name ${tA.tbd ? 'tbd' : ''}">${esc(tA.name)}</span>
      ${pick.winner === 'A' ? '<div class="pick-dot"></div>' : ''}
    </div>
    ${divider}
    <div class="match-team ${classB} ${selB} ${clickable ? 'clickable' : ''}" ${teamClickB}>
      <span class="team-flag">${tB.flag}</span>
      <span class="team-name ${tB.tbd ? 'tbd' : ''}">${esc(tB.name)}</span>
      ${pick.winner === 'B' ? '<div class="pick-dot"></div>' : ''}
    </div>
    ${scoreInput}
  </div>`;
}

// ════════════════════════════════════════════════
//  PICK ACTIONS
// ════════════════════════════════════════════════
window.pickWinner = function(matchId, slot) {
  if (!canEdit()) return;
  state.pendingPicks[matchId] = { ...(state.pendingPicks[matchId] || {}), winner: slot };
  renderBracket();
};

window.updateScorePick = function(matchId, val) {
  if (!canEdit()) return;
  state.pendingPicks[matchId] = { ...(state.pendingPicks[matchId] || {}), score: val };
  document.getElementById('save-bar').classList.toggle('hidden', !hasPending());
};

window.saveMyPicks = async function() {
  const picks = { ...(state.mySubmission?.picks || {}), ...state.pendingPicks };
  const props = { ...(state.mySubmission?.props || {}), ...state.pendingProps };
  await setDoc(doc(db, 'submissions', state.currentUser), {
    userName: state.currentUser,
    picks,
    props,
    propPoints: state.mySubmission?.propPoints ?? null,
    updatedAt: serverTimestamp(),
    submittedAt: state.mySubmission?.submittedAt || serverTimestamp()
  });
  state.pendingPicks = {};
  state.pendingProps = {};
};

window.discardChanges = function() {
  state.pendingPicks = {};
  state.pendingProps = {};
  renderBracket();
  renderProps();
};

// ════════════════════════════════════════════════
//  PROPS
// ════════════════════════════════════════════════
function renderProps() {
  const props = activeProps();
  const edit = canEdit();
  const sub = state.viewing ? state.viewing.submission : state.mySubmission;
  let html = '';

  for (const def of PROP_DEFS) {
    const val = props[def.key] ?? '';
    html += `<div class="prop-card">
      <div class="prop-label">${def.label}</div>`;
    if (edit) {
      html += `<input class="prop-input" type="${def.type}"
        value="${esc(String(val))}"
        placeholder="${def.placeholder}"
        oninput="updateProp('${def.key}', this.value)" />`;
    } else {
      html += `<div class="prop-value">${val ? esc(String(val)) : '<span class="text-muted">—</span>'}</div>`;
    }
    html += '</div>';
  }

  if (sub?.propPoints != null) {
    html += `<div style="padding:4px 0">
      <div class="prop-label">Prop Points (awarded)</div>
      <span class="prop-points-badge">+${sub.propPoints} pts</span>
    </div>`;
  }

  document.getElementById('props-container').innerHTML = html;
}

window.updateProp = function(key, val) {
  if (!canEdit()) return;
  state.pendingProps[key] = val;
  document.getElementById('save-bar').classList.toggle('hidden', !hasPending());
};

// ════════════════════════════════════════════════
//  LEADERBOARD
// ════════════════════════════════════════════════
function renderLeaderboard() {
  const container = document.getElementById('lb-content');
  if (!container) return;

  const showAll = deadlinePassed() || state.isAdmin;

  if (!showAll) {
    container.innerHTML = `<div class="lb-locked-msg">
      🔒 The leaderboard is revealed after the submission deadline.<br>
      <span class="text-muted" style="font-size:12px;margin-top:6px;display:block">Hang tight!</span>
    </div>`;
    return;
  }

  const subs = state.allSubmissions.filter(s => s);
  if (!subs.length) {
    container.innerHTML = `<p class="text-muted">No submissions yet.</p>`;
    return;
  }

  const scored = subs
    .map(s => ({ ...s, _pts: computeScore(s) }))
    .sort((a, b) => b._pts - a._pts);

  let html = '';

  if (!deadlinePassed() && state.isAdmin) {
    html += `<p style="color:var(--muted);font-size:12px;margin-bottom:14px">
      Visible to you (admin) before deadline. Others see this after picks close.
    </p>`;
  }

  html += '<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Submitted</th><th style="text-align:right">Pts</th></tr></thead><tbody>';

  scored.forEach((s, i) => {
    const isMe = s.userName === state.currentUser;
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    const updatedDate = s.updatedAt?.toDate ? s.updatedAt.toDate().toLocaleDateString() : '—';
    html += `<tr onclick="viewOther('${esc(s.userName)}')">
      <td class="lb-rank">${medal || (i + 1)}</td>
      <td class="lb-name">${esc(s.userName)}${isMe ? '<span class="you">(you)</span>' : ''}</td>
      <td class="lb-submitted">${updatedDate}</td>
      <td class="lb-pts">${s._pts}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

window.viewOther = function(userName) {
  if (userName === state.currentUser && !state.viewing) return;
  viewOther(userName);
};

// ════════════════════════════════════════════════
//  ADMIN
// ════════════════════════════════════════════════
function renderAdmin() {
  if (!state.isAdmin) return;
  const container = document.getElementById('admin-content');
  if (!container) return;

  const matches = state.bracket.matches || [];
  const getM = id => matches.find(m => m.id === id) || { id, teamA: null, teamB: null, actualWinner: null, actualScore: null };

  const dlDate = state.config.deadline
    ? (state.config.deadline instanceof Timestamp

        : new Date(state.config.deadline)
      )

  const dlTimeVal = dlDate ? dlDate.toISOString().slice(11, 16) : '23:59';

  let html = '';

  // ── Settings ──────────────────────────────────

      Set teams for each match slot. Choose <strong>Locked</strong> for confirmed teams or
      <strong>TBD</strong> for unresolved slots (picks for that match will be disabled until locked).
    </p>`;

  const allRoundGroups = [
    { label:'Round of 16',  ids:['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8'] },
    { label:'Quarterfinals', ids:['qf_1','qf_2','qf_3','qf_4'] },
    { label:'Semifinals',    ids:['sf_1','sf_2'] },
    { label:'Final',         ids:['final'] },

  ];

  for (const grp of allRoundGroups) {
    html += `<div class="round-group-label">${grp.label}</div>`;
    for (const matchId of grp.ids) {
      const match = getM(matchId);
      const tA = match.teamA || { type: 'locked', name: '', flag: '' };
      const tB = match.teamB || { type: 'locked', name: '', flag: '' };
      html += `<div class="match-editor-card">
        <h4>${MATCH_META[matchId]?.label || matchId}</h4>
        <div class="form-row">
          <label>Team A</label>
          <select class="form-select" id="me-typeA-${matchId}">
            <option value="locked" ${tA.type !== 'open' ? 'selected' : ''}>Locked</option>
            <option value="open"   ${tA.type === 'open' ? 'selected' : ''}>TBD</option>
          </select>
          <input class="form-input" type="text" id="me-nameA-${matchId}" placeholder="Team name" value="${esc(tA.name || '')}" />
          <input class="form-input" type="text" id="me-flagA-${matchId}" placeholder="🏳️" value="${esc(tA.flag || '')}" style="max-width:70px" />
        </div>
        <div class="form-row">
          <label>Team B</label>
          <select class="form-select" id="me-typeB-${matchId}">
            <option value="locked" ${tB.type !== 'open' ? 'selected' : ''}>Locked</option>
            <option value="open"   ${tB.type === 'open' ? 'selected' : ''}>TBD</option>
          </select>
          <input class="form-input" type="text" id="me-namB-${matchId}" placeholder="Team name" value="${esc(tB.name || '')}" />
          <input class="form-input" type="text" id="me-flagB-${matchId}" placeholder="🏳️" value="${esc(tB.flag || '')}" style="max-width:70px" />
        </div>

  html += `<button class="btn btn-success" onclick="saveBracket()">💾 Save Bracket</button>`;

    </div></div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

// ── Admin save actions ────────────────────────────
window.saveConfig = async function() {
  const dateVal = document.getElementById('cfg-deadline-date').value;
  const timeVal = document.getElementById('cfg-deadline-time').value;
  const published = document.getElementById('cfg-published').checked;
  let deadlineValue = null;
  if (dateVal) {
    deadlineValue = Timestamp.fromDate(new Date(`${dateVal}T${timeVal || '23:59'}`));
  }
  try {
    await setDoc(doc(db, 'config', 'main'), { deadline: deadlineValue, published }, { merge: true });
    alert('Settings saved.');
  } catch (e) {
    alert(`Failed to save settings: ${e.message}`);
  }
};

window.saveBracket = async function() {
  const existing = [...(state.bracket.matches || [])];

  const allIds = [
    'r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8',
    'qf_1','qf_2','qf_3','qf_4','sf_1','sf_2','third','final'
  ];

  for (const matchId of allIds) {
    const nameAEl  = document.getElementById(`me-nameA-${matchId}`);
    const nameBEl  = document.getElementById(`me-namB-${matchId}`);
    const typeAEl  = document.getElementById(`me-typeA-${matchId}`);
    const typeBEl  = document.getElementById(`me-typeB-${matchId}`);
    const flagAEl  = document.getElementById(`me-flagA-${matchId}`);
    const flagBEl  = document.getElementById(`me-flagB-${matchId}`);
    if (!nameAEl) continue;

    let m = existing.find(x => x.id === matchId);
    if (!m) { m = { id: matchId, actualWinner: null, actualScore: null }; existing.push(m); }
    m.teamA = { type: typeAEl.value, name: nameAEl.value.trim(), flag: flagAEl.value.trim() };
    m.teamB = { type: typeBEl.value, name: nameBEl.value.trim(), flag: flagBEl.value.trim() };
  }

  try {
    await setDoc(doc(db, 'bracket', 'main'), { matches: existing });
    alert('Bracket saved!');
  } catch (e) {
    alert(`Failed to save bracket: ${e.message}`);
  }
};

window.saveResults = async function() {
  const matches = [...(state.bracket.matches || [])];
  const allIds = [
    'r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8',
    'qf_1','qf_2','qf_3','qf_4','sf_1','sf_2','third','final'
  ];
  for (const matchId of allIds) {
    const winEl   = document.getElementById(`res-win-${matchId}`);
    const scoreEl = document.getElementById(`res-score-${matchId}`);
    if (!winEl) continue;
    let m = matches.find(x => x.id === matchId);
    if (!m) { m = { id: matchId, teamA: null, teamB: null }; matches.push(m); }
    m.actualWinner = winEl.value || null;
    m.actualScore  = scoreEl.value.trim() || null;
  }
  try {
    await setDoc(doc(db, 'bracket', 'main'), { matches });
    alert('Results saved!');
  } catch (e) {
    alert(`Failed to save results: ${e.message}`);
  }
};

window.savePropPoints = async function(userName) {
  const safeId = userName.replace(/[^a-zA-Z0-9]/g, '_');
  const pts = parseInt(document.getElementById(`pp-${safeId}`)?.value ?? 0, 10);
  try {
    await setDoc(doc(db, 'submissions', userName), { propPoints: pts }, { merge: true });
  } catch (e) {
    alert(`Failed to save prop points for ${userName}: ${e.message}`);
  }
};

// ════════════════════════════════════════════════
//  LANDING
// ════════════════════════════════════════════════
window.toggleAdminLogin = function() {
  const wrap = document.getElementById('admin-login-wrap');
  wrap.classList.toggle('hidden');
};

window.enterApp = async function() {
  const name     = document.getElementById('name-input').value.trim();
  const passcode = document.getElementById('passcode-input')?.value.trim() || '';
  const errEl    = document.getElementById('landing-error');
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Please enter your name.'; return; }

  const isAdmin = passcode !== '' && passcode === ADMIN_PASSCODE;
  if (passcode && !isAdmin) { errEl.textContent = 'Incorrect passcode.'; return; }

  // Init Firebase
  const firebaseApp = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(firebaseApp);

  state.currentUser = name;
  state.isAdmin     = isAdmin;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user-label').textContent = name + (isAdmin ? ' (Admin)' : '');
  document.getElementById('nav-admin').classList.toggle('hidden', !isAdmin);

  setupListeners();
};

// Enter on keypress for name field
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.enterApp();
});
</script>
