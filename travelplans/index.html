const {
  useState, useEffect, useReducer, useContext, createContext,
  useRef, useMemo, useCallback
} = React;

// ─── Constants ────────────────────────────────────────────────────────────────

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const YEAR = new Date().getFullYear();
const EMOJIS = [
  '✈️','🏖️','🏔️','🏕️','🚗','🚂','🚢','🏨','🎭','🍽️',
  '⛷️','🏄','🎪','🌴','🗺️','🎒','🏟️','🌊','🏞️','🎡',
  '🧳','🌏','🎯','🏋️','🎸','🎨','📸','🍕','🎬','🌺',
];

// ─── Utilities ────────────────────────────────────────────────────────────────

const uuid = () => crypto.randomUUID();

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getMonthGrid(year, month) {
  const cells = [];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    cells.push({ dateStr: toDateStr(new Date(year, month, -(firstDay - 1 - i))), isCurrentMonth: false });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ dateStr: toDateStr(new Date(year, month, d)), isCurrentMonth: true });
  }
  let next = 1;
  while (cells.length < 42) {
    cells.push({ dateStr: toDateStr(new Date(year, month + 1, next++)), isCurrentMonth: false });
  }
  return cells;
}

function daysBetween(start, end) {
  if (!start || !end) return 0;
  const s = new Date(start + 'T12:00:00');
  const e = new Date(end + 'T12:00:00');
  return Math.max(1, Math.round((e - s) / 86400000) + 1);
}

function displayDate(dateStr) {
  if (!dateStr) return '';
  const [, m, d] = dateStr.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function displayDateRange(start, end) {
  if (!start) return '';
  if (!end || start === end) return displayDateFull(start);
  return `${displayDateFull(start)} → ${displayDateFull(end)}`;
}

function displayDateFull(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${MONTHS[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function isInRange(dateStr, startDate, endDate) {
  return dateStr >= startDate && dateStr <= (endDate || startDate);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

// ─── Local-only persistence (PIN only) ───────────────────────────────────────

function lsLoad(key, def) {
  try {
    const v = localStorage.getItem(key);
    return v !== null ? JSON.parse(v) : def;
  } catch { return def; }
}

function lsSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── Reducer ──────────────────────────────────────────────────────────────────

const EMPTY_PTO = { totalDays: 0, lastTripStart: '', lastTripEnd: '', lastTripDays: '' };

const initState = {
  events:    [],
  comments:  [],
  tripIdeas: [],
  pto:       EMPTY_PTO,
  notes:     '',
  dayNotes:  {},
};

function reducer(state, action) {
  switch (action.type) {
    // ── Firestore snapshot setters ────────────────────────────────────────────
    case 'SET_EVENTS':
      return { ...state, events: action.events };
    case 'SET_COMMENTS':
      return { ...state, comments: action.comments };
    case 'SET_TRIP_IDEAS':
      return { ...state, tripIdeas: action.tripIdeas };
    case 'SET_PTO':
      return { ...state, pto: action.pto };
    case 'SET_NOTES':
      return { ...state, notes: action.notes };
    case 'SET_DAY_NOTES':
      return { ...state, dayNotes: action.dayNotes };

    // ── Optimistic local actions ───────────────────────────────────────────────
    case 'ADD_EVENT':
      return { ...state, events: [...state.events, action.event] };
    case 'UPDATE_EVENT':
      return { ...state, events: state.events.map(e => e.id === action.event.id ? action.event : e) };
    case 'DELETE_EVENT':
      return { ...state, events: state.events.filter(e => e.id !== action.id) };
    case 'ADD_COMMENT':
      return { ...state, comments: [...state.comments, action.comment] };
    case 'DELETE_COMMENT':
      return { ...state, comments: state.comments.filter(c => c.id !== action.id) };
    case 'ADD_TRIP_IDEA':
      return { ...state, tripIdeas: [...state.tripIdeas, action.idea], events: [...state.events, action.event] };
    case 'REMOVE_TRIP_IDEA': {
      const idea = state.tripIdeas.find(t => t.id === action.id);
      return {
        ...state,
        tripIdeas: state.tripIdeas.filter(t => t.id !== action.id),
        events: state.events.filter(e => e.id !== (idea && idea.eventId)),
      };
    }
    case 'CONFIRM_TRIP':
      return { ...state, events: state.events.map(e => e.id === action.eventId ? { ...e, type: 'confirmed' } : e) };
    case 'UPDATE_PTO':
      return { ...state, pto: action.pto };
    case 'UPDATE_NOTES':
      return { ...state, notes: action.notes };
    case 'SET_DAY_NOTE':
      return { ...state, dayNotes: { ...state.dayNotes, [action.dateStr]: { color: action.color, note: action.note } } };
    case 'CLEAR_DAY_NOTE': {
      const dn = { ...state.dayNotes };
      delete dn[action.dateStr];
      return { ...state, dayNotes: dn };
    }
    default:
      return state;
  }
}

// ─── Contexts ─────────────────────────────────────────────────────────────────

const DataCtx = createContext();
const AuthCtx = createContext();

// ─── Shared: EmojiPicker ──────────────────────────────────────────────────────

function EmojiPicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="relative" ref={ref}>
      <button type="button" onClick={() => setOpen(o => !o)}
        className="w-11 h-10 text-xl border-2 border-slate-200 rounded-lg hover:border-blue-400 flex items-center justify-center transition-colors">
        {value}
      </button>
      {open && (
        <div className="absolute z-20 top-12 left-0 bg-white border border-slate-200 rounded-xl shadow-xl p-2 grid grid-cols-6 gap-1 w-52">
          {EMOJIS.map(e => (
            <button key={e} type="button"
              onClick={() => { onChange(e); setOpen(false); }}
              className={`text-xl w-8 h-8 rounded flex items-center justify-center hover:bg-slate-100 ${value === e ? 'bg-blue-100' : ''}`}>
              {e}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Left Panel ───────────────────────────────────────────────────────────────

function PTOTracker() {
  const { state, dispatch } = useContext(DataCtx);
  const { isOwner } = useContext(AuthCtx);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ ...state.pto });

  useEffect(() => { setDraft({ ...state.pto }); }, [state.pto]);
  useEffect(() => { if (!isOwner) setEditing(false); }, [isOwner]);

  const save = () => {
    dispatch({ type: 'UPDATE_PTO', pto: draft });
    setEditing(false);
  };

  const { totalDays, lastTripStart, lastTripEnd, lastTripDays } = state.pto;

  if (editing) return (
    <div className="bg-slate-700 rounded-2xl p-4 space-y-3">
      <p className="text-xs font-bold text-blue-400 uppercase tracking-widest">PTO Tracker</p>
      <div>
        <label className="text-xs text-slate-400">Total PTO Days Taken</label>
        <input type="number" min="0" value={draft.totalDays}
          onChange={e => setDraft(d => ({ ...d, totalDays: parseInt(e.target.value) || 0 }))}
          className="w-full bg-slate-600 border border-slate-500 rounded-lg px-3 py-2 text-sm text-white mt-1 outline-none focus:border-blue-400" />
      </div>
      <div>
        <label className="text-xs text-slate-400">Last Trip Start</label>
        <input type="date" value={draft.lastTripStart}
          onChange={e => setDraft(d => ({ ...d, lastTripStart: e.target.value }))}
          className="w-full bg-slate-600 border border-slate-500 rounded-lg px-3 py-2 text-sm text-white mt-1 outline-none focus:border-blue-400" />
      </div>
      <div>
        <label className="text-xs text-slate-400">Last Trip End</label>
        <input type="date" value={draft.lastTripEnd} min={draft.lastTripStart}
          onChange={e => setDraft(d => ({ ...d, lastTripEnd: e.target.value }))}
          className="w-full bg-slate-600 border border-slate-500 rounded-lg px-3 py-2 text-sm text-white mt-1 outline-none focus:border-blue-400" />
      </div>
      <div>
        <label className="text-xs text-slate-400">Last Trip Days</label>
        <input type="number" min="0" value={draft.lastTripDays}
          onChange={e => setDraft(d => ({ ...d, lastTripDays: e.target.value }))}
          className="w-full bg-slate-600 border border-slate-500 rounded-lg px-3 py-2 text-sm text-white mt-1 outline-none focus:border-blue-400"
          placeholder="e.g. 5" />
      </div>
      <div className="flex gap-2">
        <button onClick={save} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-2 text-sm font-semibold">Save</button>
        <button onClick={() => { setDraft({ ...state.pto }); setEditing(false); }}
          className="flex-1 bg-slate-600 hover:bg-slate-500 text-slate-200 rounded-xl py-2 text-sm">Cancel</button>
      </div>
    </div>
  );

  return (
    <div className="bg-slate-700 rounded-2xl p-4">
      <div className="flex justify-between items-center mb-3">
        <p className="text-xs font-bold text-blue-400 uppercase tracking-widest">PTO Tracker</p>
        {isOwner && (
          <button onClick={() => setEditing(true)} className="text-xs text-slate-400 hover:text-blue-300 transition-colors">Edit</button>
        )}
      </div>
      <div className="flex items-baseline gap-2 mb-2">
        <span className="text-4xl font-black text-white">{totalDays}</span>
        <span className="text-sm text-slate-400">days taken this year</span>
      </div>
      {lastTripStart && lastTripEnd ? (
        <div className="bg-slate-600/50 rounded-xl px-3 py-2">
          <p className="text-xs text-slate-400">Last Trip</p>
          <p className="text-sm text-slate-200 font-medium">
            {displayDate(lastTripStart)} – {displayDate(lastTripEnd)}
            {lastTripDays && <span className="ml-2 text-blue-400 font-semibold">({lastTripDays} {lastTripDays == 1 ? 'day' : 'days'})</span>}
          </p>
        </div>
      ) : (
        <p className="text-xs text-slate-500 italic">No trip recorded yet</p>
      )}
    </div>
  );
}

function OwnerNotes() {
  const { state, dispatch } = useContext(DataCtx);
  const { isOwner } = useContext(AuthCtx);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(state.notes);

  useEffect(() => { if (!isOwner) setEditing(false); }, [isOwner]);

  const save = () => {
    dispatch({ type: 'UPDATE_NOTES', notes: draft });
    setEditing(false);
  };

  const cancel = () => {
    setDraft(state.notes);
    setEditing(false);
  };

  return (
    <div className="flex flex-col flex-1 min-h-0">
      <div className="flex justify-between items-center mb-2">
        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Notes & Availability</p>
        {isOwner && (
          editing
            ? <div className="flex gap-3">
                <button onClick={save} className="text-xs text-blue-400 hover:text-blue-300">Save</button>
                <button onClick={cancel} className="text-xs text-slate-500 hover:text-slate-400">Cancel</button>
              </div>
            : <button onClick={() => { setDraft(state.notes); setEditing(true); }}
                className="text-xs text-slate-400 hover:text-blue-300 transition-colors">Edit</button>
        )}
      </div>
      {editing ? (
        <textarea
          value={draft}
          onChange={e => setDraft(e.target.value)}
          autoFocus
          className="flex-1 w-full bg-slate-700 border border-slate-600 focus:border-blue-500 rounded-xl p-3 text-sm text-slate-200 placeholder-slate-500 resize-none outline-none min-h-32"
          placeholder="Jot down upcoming plans, open weekends, or availability windows..."
        />
      ) : state.notes ? (
        <div className="flex-1 bg-slate-700/50 rounded-xl p-3 text-sm text-slate-300 whitespace-pre-wrap overflow-y-auto scrollbar-thin min-h-32">
          {state.notes}
        </div>
      ) : (
        <div className="flex-1 bg-slate-700/30 rounded-xl p-3 text-sm text-slate-500 italic flex items-start min-h-32">
          No notes yet.
        </div>
      )}
    </div>
  );
}

const OWNER_PIN = '0951';

function OwnerUnlockStrip({ onAuth }) {
  const [pin, setPin] = useState('');
  const [err, setErr] = useState(false);
  const [open, setOpen] = useState(false);

  const attempt = () => {
    if (pin === OWNER_PIN) { onAuth(); setPin(''); setOpen(false); setErr(false); }
    else {
      setErr(true); setPin('');
      setTimeout(() => setErr(false), 1500);
    }
  };

  if (!open) return (
    <button onClick={() => setOpen(true)}
      className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-slate-700 hover:bg-slate-600 text-slate-400 hover:text-slate-200 text-xs font-semibold transition-colors border border-slate-600">
      🔒 Unlock to Edit
    </button>
  );

  return (
    <div className="bg-slate-700 rounded-2xl p-3 space-y-2 border border-slate-600">
      <p className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Enter PIN to edit</p>
      <div className="flex gap-2">
        <input
          type="password"
          value={pin}
          onChange={e => setPin(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && attempt()}
          autoFocus
          placeholder="PIN"
          className={`flex-1 text-center border-2 rounded-xl px-3 py-2 text-sm tracking-[0.25em] bg-slate-600 text-white placeholder-slate-500 outline-none transition-all
            ${err ? 'border-red-500' : 'border-slate-500 focus:border-blue-400'}`}
        />
        <button onClick={attempt}
          className="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-semibold transition-colors">
          Unlock
        </button>
        <button onClick={() => { setOpen(false); setPin(''); setErr(false); }}
          className="px-2 py-2 bg-slate-600 hover:bg-slate-500 text-slate-400 rounded-xl text-xs transition-colors">
          ✕
        </button>
      </div>
      {err && <p className="text-red-400 text-xs text-center">Incorrect PIN</p>}
    </div>
  );
}

function LeftPanel() {
  const { isOwner, setOwner } = useContext(AuthCtx);

  return (
    <div className="h-full bg-slate-800 flex flex-col overflow-hidden">
      <div className="flex-shrink-0 px-5 py-4 border-b border-slate-700 flex items-center justify-between">
        <div>
          <h2 className="text-sm font-bold text-slate-200">Owner Panel</h2>
          <p className="text-xs text-slate-500">
            {isOwner ? 'Editing unlocked' : 'Read-only — unlock to edit'}
          </p>
        </div>
        {isOwner && (
          <button onClick={() => setOwner(false)}
            className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-400 hover:text-slate-200 px-3 py-1.5 rounded-lg transition-colors">
            Lock
          </button>
        )}
      </div>

      <div className="flex-1 overflow-y-auto owner-scrollbar p-4 flex flex-col gap-4">
        <PTOTracker />
        <OwnerNotes />
        <div className="flex-shrink-0 mt-auto pt-2">
          {!isOwner && <OwnerUnlockStrip onAuth={() => setOwner(true)} />}
        </div>
      </div>
    </div>
  );
}

// ─── Calendar ─────────────────────────────────────────────────────────────────

function EventModal({ event, onClose, onEdit, onDelete }) {
  const { state } = useContext(DataCtx);
  const { isOwner } = useContext(AuthCtx);
  const ref = useRef();
  const commentCount = state.comments.filter(c => c.eventId === event.id).length;

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const isMultiDay = event.startDate !== event.endDate;
  const confirmed = event.type === 'confirmed';
  const visiting = event.type === 'visiting';

  const headerGradient = confirmed
    ? 'bg-gradient-to-br from-blue-600 to-blue-700'
    : visiting
      ? 'bg-gradient-to-br from-emerald-600 to-emerald-700'
      : 'bg-gradient-to-br from-slate-500 to-slate-600';

  const badgeClass = confirmed
    ? 'bg-blue-500/60 text-white'
    : visiting
      ? 'bg-emerald-500/60 text-white'
      : 'bg-white/20 text-white/90';

  const badgeLabel = confirmed ? '✓ Confirmed' : visiting ? '🏠 Visiting Me' : '~ Tentative';

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm">
      <div ref={ref} className="modal-enter bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
        <div className={`px-5 pt-5 pb-4 ${headerGradient}`}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex items-start gap-3 min-w-0">
              <span className="text-3xl flex-shrink-0 mt-0.5">{event.icon}</span>
              <div className="min-w-0">
                <h3 className="text-white font-bold text-lg leading-snug">{event.title}</h3>
                <p className="text-white/75 text-xs mt-0.5">
                  {isMultiDay
                    ? `${displayDateFull(event.startDate)} → ${displayDateFull(event.endDate)}`
                    : displayDateFull(event.startDate)
                  }
                </p>
                {isMultiDay && (
                  <p className="text-white/60 text-xs">{daysBetween(event.startDate, event.endDate)} days</p>
                )}
              </div>
            </div>
            <button onClick={onClose}
              className="flex-shrink-0 w-7 h-7 rounded-full bg-white/20 hover:bg-white/30 text-white flex items-center justify-center text-lg leading-none transition-colors">
              ×
            </button>
          </div>
          <div className="flex gap-2 mt-3">
            <span className={`text-xs px-2.5 py-1 rounded-full font-semibold ${badgeClass}`}>
              {badgeLabel}
            </span>
            {event.source === 'guest' && (
              <span className="text-xs px-2.5 py-1 rounded-full font-semibold bg-amber-400/80 text-amber-900">
                Guest Idea
              </span>
            )}
          </div>
        </div>

        <div className="px-5 py-4 space-y-3">
          {event.description ? (
            <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{event.description}</p>
          ) : (
            <p className="text-sm text-slate-400 italic">No description provided.</p>
          )}
          {commentCount > 0 && (
            <p className="text-xs text-slate-400 flex items-center gap-1">
              <span>💬</span>
              {commentCount} {commentCount === 1 ? 'comment' : 'comments'} in guest panel
            </p>
          )}
          {isOwner && (
            <div className="flex gap-2 pt-2 border-t border-slate-100">
              <button onClick={onEdit}
                className="flex-1 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-xl py-2 text-sm font-semibold transition-colors">
                ✏️ Edit
              </button>
              <button onClick={onDelete}
                className="flex-1 bg-red-50 text-red-500 hover:bg-red-100 rounded-xl py-2 text-sm font-semibold transition-colors">
                🗑 Delete
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function EventForm({ title, initial, onSave, onCancel }) {
  const [form, setForm] = useState(() => ({
    icon: '✈️',
    title: '',
    startDate: '',
    endDate: '',
    description: '',
    type: 'confirmed',

function EventChip({ event, dateStr, onClick }) {
  const isMulti = event.startDate !== event.endDate;
  const isStart = event.startDate === dateStr;
  const isEnd = event.endDate === dateStr;

  const baseClass = 'chip-text flex items-center gap-0.5 px-1.5 py-0.5 cursor-pointer select-none transition-opacity hover:opacity-80 overflow-hidden';

  let colorClass;
  if (event.type === 'confirmed') {
    colorClass = 'bg-blue-500 text-white font-medium';
  } else if (event.type === 'visiting') {
    colorClass = 'bg-emerald-500 text-white font-medium';
  } else if (event.source === 'guest') {
    colorClass = 'bg-amber-100 text-amber-800 border border-amber-300 italic';
  } else {
    colorClass = 'bg-slate-200 text-slate-500 border border-slate-300 italic';
  }

  let radiusClass = 'rounded';
  if (isMulti) {
    if (isStart && isEnd) radiusClass = 'rounded';
    else if (isStart) radiusClass = 'rounded-r-none rounded-l';
    else if (isEnd)   radiusClass = 'rounded-l-none rounded-r';
    else              radiusClass = 'rounded-none';
  }

  return (
    <div onClick={e => { e.stopPropagation(); onClick(event); }}
      className={`${baseClass} ${colorClass} ${radiusClass}`}>
      {(isStart || !isMulti) && (
        <span className="text-xs leading-none flex-shrink-0">{event.icon}</span>
      )}
      <span className="truncate">{event.title}</span>
    </div>
  );
}

  const isToday = dateStr === today;
  const noteBg = dayNote ? (DAY_NOTE_BG[dayNote.color] || 'bg-rose-100') : '';

  return (
    <div
      onClick={() => isCurrentMonth && onCellClick(dateStr)}
      className={`cal-cell border-r border-b border-slate-100 p-1.5 flex flex-col overflow-hidden transition-colors
        ${!isCurrentMonth ? 'bg-slate-50/40' : `cursor-pointer hover:bg-blue-50/50 ${noteBg}`}

      <div className="flex items-center justify-between mb-1 flex-shrink-0">

          ${isToday

    dispatch({ type: 'SET_DAY_NOTE', dateStr: noteDate, color, note });

      <p className="text-xs text-amber-600">Your idea will appear as a tentative event on the cal. We'll discuss, then confirm.</p>
      <input value={form.submittedBy} onChange={e => set('submittedBy', e.target.value)} placeholder="Your name *"
        className="w-full border border-amber-200 bg-white rounded-xl px-3 py-2.5 text-sm outline-none focus:border-amber-400 transition-all" required />
      <div className="flex gap-2 items-end">
        <div>
          <label className="text-xs text-amber-600 block mb-1.5">Icon</label>
          <EmojiPicker value={icon} onChange={setIcon} />
        </div>
        <div className="flex-1">
          <label className="text-xs text-amber-600 block mb-1.5">Title *</label>
          <input value={form.title} onChange={e => set('title', e.target.value)} placeholder="Trip idea..." required
            className="w-full border border-amber-200 bg-white rounded-xl px-3 py-2.5 text-sm outline-none focus:border-amber-400 transition-all" />
        </div>
      </div>
      <div className="flex gap-2">
        <div className="flex-1">
          <label className="text-xs text-amber-600 block mb-1.5">Start Date *</label>
          <input type="date" value={form.startDate} onChange={e => set('startDate', e.target.value)} required
            className="w-full border border-amber-200 bg-white rounded-xl px-3 py-2.5 text-sm outline-none focus:border-amber-400 transition-all" />
        </div>
        <div className="flex-1">
          <label className="text-xs text-amber-600 block mb-1.5">End Date</label>
          <input type="date" value={form.endDate} onChange={e => set('endDate', e.target.value)} min={form.startDate}
            className="w-full border border-amber-200 bg-white rounded-xl px-3 py-2.5 text-sm outline-none focus:border-amber-400 transition-all" />
        </div>
      </div>
      <textarea value={form.description} onChange={e => set('description', e.target.value)}
        placeholder="What you tryna get into?"
        className="w-full border border-amber-200 bg-white rounded-xl px-3 py-2.5 text-sm resize-none outline-none focus:border-amber-400 transition-all h-16" />
      <button type="submit"
        className={`w-full rounded-xl py-2.5 text-sm font-bold transition-all
          ${sent ? 'bg-green-500 text-white' : 'bg-amber-500 hover:bg-amber-600 text-white'}`}>
        {sent ? '✓ Submitted!' : 'Submit Trip Idea'}
      </button>
    </form>
  );
}

function TentativePlansTab() {
  const { state, dispatch } = useContext(DataCtx);
  const { isOwner } = useContext(AuthCtx);
  const ideas = useMemo(() => [...state.tripIdeas].reverse(), [state.tripIdeas]);

  return (
    <div className="space-y-3">
      <SubmitTripIdeaForm />
      {ideas.length === 0 ? (
        <div className="text-center py-6 text-stone-400 text-sm italic">
          No trip ideas yet — submit one above!
        </div>
      ) : (
        ideas.map(idea => {
          const eventIsConfirmed = state.events.find(e => e.id === idea.eventId)?.type === 'confirmed';
          const isMultiDay = idea.startDate !== idea.endDate;
          return (
            <div key={idea.id} className={`bg-white rounded-2xl border p-4 space-y-2
              ${eventIsConfirmed ? 'border-green-300 bg-green-50/30' : 'border-amber-200'}`}>
              <div className="flex items-start justify-between gap-2">
                <div className="flex items-start gap-2">
                  <span className="text-xl flex-shrink-0 mt-0.5">{idea.icon || '🌴'}</span>
                  <div>
                    <p className="text-sm font-bold text-stone-700">{idea.title}</p>
                    <p className="text-xs text-stone-500">by <span className="font-medium">{idea.submittedBy}</span></p>
                  </div>
                </div>
                <span className={`flex-shrink-0 text-xs px-2.5 py-1 rounded-full font-semibold
                  ${eventIsConfirmed ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                  {eventIsConfirmed ? '✓ Confirmed' : '~ Tentative'}
                </span>
              </div>
              <p className="text-xs text-stone-500">
                <span className="font-medium">{displayDateFull(idea.startDate)}</span>
                {isMultiDay && <span> → <span className="font-medium">{displayDateFull(idea.endDate)}</span></span>}
                <span className="ml-2 text-stone-400">({daysBetween(idea.startDate, idea.endDate)} {daysBetween(idea.startDate, idea.endDate) === 1 ? 'day' : 'days'})</span>
              </p>
              {idea.description && <p className="text-sm text-stone-600 leading-relaxed">{idea.description}</p>}
              {isOwner && (
                <div className="flex gap-2 pt-1.5 border-t border-stone-100">
                  {!eventIsConfirmed && (
                    <button onClick={() => dispatch({ type: 'CONFIRM_TRIP', eventId: idea.eventId })}
                      className="flex-1 bg-green-50 text-green-700 hover:bg-green-100 rounded-xl py-2 text-xs font-bold transition-colors border border-green-200">
                      ✓ Confirm Trip
                    </button>
                  )}
                  <button onClick={() => dispatch({ type: 'REMOVE_TRIP_IDEA', id: idea.id, eventId: idea.eventId })}
                    className="flex-1 bg-red-50 text-red-500 hover:bg-red-100 rounded-xl py-2 text-xs font-bold transition-colors border border-red-200">
                    Remove
                  </button>
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
}

function RightPanel() {
  const [tab, setTab] = useState('comments');
  const { state } = useContext(DataCtx);
  const commentCount  = state.comments.length;
  const ideaCount     = state.tripIdeas.length;

  return (
    <div className="h-full bg-stone-50 flex flex-col overflow-hidden border-l border-stone-200">
      <div className="flex-shrink-0 px-4 pt-4 pb-3 border-b border-stone-200">
        <h2 className="text-sm font-bold text-stone-600 mb-3">Guest Panel</h2>
        <div className="flex bg-stone-200 rounded-xl p-1 gap-1">
          {[
            ['comments', '💬 Comments', commentCount],
            ['tentative', '🗺️ Trip Ideas', ideaCount],
          ].map(([id, label, count]) => (
            <button key={id} onClick={() => setTab(id)}
              className={`flex-1 text-xs py-2 px-1 rounded-lg font-semibold transition-all flex items-center justify-center gap-1.5
                ${tab === id ? 'bg-white text-stone-800 shadow-sm' : 'text-stone-500 hover:text-stone-700'}`}>
              {label}
              {count > 0 && (
                <span className={`text-xs px-1.5 py-0.5 rounded-full leading-none font-bold
                  ${id === 'comments' ? 'bg-blue-500 text-white' : 'bg-amber-500 text-white'}`}>
                  {count}
                </span>
              )}
            </button>
          ))}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto scrollbar-thin p-4">
        {tab === 'comments' ? <CommentsTab /> : <TentativePlansTab />}
      </div>
    </div>
  );
}

// ─── Loading screen ───────────────────────────────────────────────────────────

function LoadingScreen() {
  return (
    <div className="h-screen flex items-center justify-center bg-slate-900">
      <div className="text-center space-y-3">
        <div className="text-4xl animate-pulse">✈️</div>
        <p className="text-slate-400 text-sm">Loading travel plans…</p>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [state, localDispatch] = useReducer(reducer, initState);
  const [isOwner, setOwner] = useState(false);
  const [fbReady, setFbReady] = useState(!!window.__fbReady);
  const [loading, setLoading] = useState(true);

  // Wait for Firebase module to initialise
  useEffect(() => {
    if (window.__fbReady) { setFbReady(true); return; }
    const handler = () => setFbReady(true);
    window.addEventListener('firebase-ready', handler);
    return () => window.removeEventListener('firebase-ready', handler);
  }, []);

  // Subscribe to all Firestore collections once Firebase is ready
  useEffect(() => {
    if (!fbReady) return;
    const { db, collection, doc, onSnapshot } = window.__fb;

    let resolved = 0;
    const total = 6;
    const check = () => { if (++resolved >= total) setLoading(false); };

    const unsubs = [
      onSnapshot(collection(db, 'events'), snap => {
        localDispatch({ type: 'SET_EVENTS', events: snap.docs.map(d => ({ id: d.id, ...d.data() })) });
        check();
      }),
      onSnapshot(collection(db, 'comments'), snap => {
        localDispatch({ type: 'SET_COMMENTS', comments: snap.docs.map(d => ({ id: d.id, ...d.data() })) });
        check();
      }),
      onSnapshot(collection(db, 'tripIdeas'), snap => {
        localDispatch({ type: 'SET_TRIP_IDEAS', tripIdeas: snap.docs.map(d => ({ id: d.id, ...d.data() })) });
        check();
      }),
      onSnapshot(doc(db, 'settings', 'pto'), snap => {
        localDispatch({ type: 'SET_PTO', pto: snap.exists() ? snap.data() : { totalDays: 0, lastTripStart: '', lastTripEnd: '', lastTripDays: '' } });
        check();
      }),
      onSnapshot(doc(db, 'settings', 'notes'), snap => {
        localDispatch({ type: 'SET_NOTES', notes: snap.exists() ? (snap.data().notes || '') : '' });
        check();
      }),
      onSnapshot(collection(db, 'dayNotes'), snap => {
        const dayNotes = {};
        snap.docs.forEach(d => { dayNotes[d.id] = d.data(); });
        localDispatch({ type: 'SET_DAY_NOTES', dayNotes });
        check();
      }),
    ];

    return () => unsubs.forEach(u => u());
  }, [fbReady]);

  // Firestore-aware dispatch: optimistically updates local state, then persists to Firestore
  const dispatch = useCallback(async (action) => {
    if (!window.__fb) { localDispatch(action); return; }
    const { db, collection, doc, setDoc, deleteDoc, updateDoc } = window.__fb;

    // Optimistic local update
    localDispatch(action);

    try {
      switch (action.type) {
        case 'ADD_EVENT':
          await setDoc(doc(db, 'events', action.event.id), action.event);
          break;
        case 'UPDATE_EVENT':
          await setDoc(doc(db, 'events', action.event.id), action.event);
          break;
        case 'DELETE_EVENT':
          await deleteDoc(doc(db, 'events', action.id));
          break;
        case 'ADD_COMMENT':
          await setDoc(doc(db, 'comments', action.comment.id), action.comment);
          break;
        case 'DELETE_COMMENT':
          await deleteDoc(doc(db, 'comments', action.id));
          break;
        case 'ADD_TRIP_IDEA':
          await Promise.all([
            setDoc(doc(db, 'tripIdeas', action.idea.id), action.idea),
            setDoc(doc(db, 'events', action.event.id), action.event),
          ]);
          break;
        case 'REMOVE_TRIP_IDEA': {
          // Find the idea's eventId from current local state before it's removed
          // (localDispatch ran already, so use the action's id against Firestore directly)
          // We store eventId on the idea, so we need it — grab from local state before optimistic update
          // Actually we dispatched optimistically first, so we need the eventId from action context.
          // The action doesn't carry eventId — we need to get it from state before dispatch.
          // This is handled by the caller passing the full idea; see workaround below.
          if (action.eventId) {
            await Promise.all([
              deleteDoc(doc(db, 'tripIdeas', action.id)),
              deleteDoc(doc(db, 'events', action.eventId)),
            ]);
          } else {
            await deleteDoc(doc(db, 'tripIdeas', action.id));
          }
          break;
        }
        case 'CONFIRM_TRIP':
          await updateDoc(doc(db, 'events', action.eventId), { type: 'confirmed' });
          break;
        case 'UPDATE_PTO':
          await setDoc(doc(db, 'settings', 'pto'), action.pto);
          break;
        case 'UPDATE_NOTES':
          await setDoc(doc(db, 'settings', 'notes'), { notes: action.notes });
          break;
        case 'SET_DAY_NOTE':
          await setDoc(doc(db, 'dayNotes', action.dateStr), { color: action.color, note: action.note });
          break;
        case 'CLEAR_DAY_NOTE':
          await deleteDoc(doc(db, 'dayNotes', action.dateStr));
          break;
        default:
          break;
      }
    } catch (err) {
      console.error('Firestore write failed:', action.type, err);
    }
  }, []);

  if (!fbReady || loading) return <LoadingScreen />;

  return (
    <AuthCtx.Provider value={{ isOwner, setOwner }}>
      <DataCtx.Provider value={{ state, dispatch }}>
        <div className="h-screen flex overflow-hidden">
          <div style={{ width: '25%' }} className="flex-shrink-0 h-full overflow-hidden">
            <LeftPanel />
          </div>
          <div style={{ width: '50%' }} className="flex-shrink-0 h-full overflow-hidden border-x border-slate-200 shadow-sm">
            <CalendarWidget />
          </div>
          <div style={{ width: '25%' }} className="flex-shrink-0 h-full overflow-hidden">
            <RightPanel />
          </div>
        </div>
      </DataCtx.Provider>
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
