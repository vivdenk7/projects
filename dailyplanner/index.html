<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Planner</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='26' y='6' width='12' height='52' rx='6' fill='%2322c55e'/%3E%3Crect x='6' y='26' width='52' height='12' rx='6' fill='%2322c55e'/%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f3f4f6;
      letter-spacing: -0.01em;
    }

    header .date {
      font-size: 13px;
      color: #6b7280;
    }

    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CATEGORY COLORS ── */
    :root {
      --c-M: #f472b6;
      --c-M-light: #3b1a2e;
      --c-B: #34d399;
      --c-B-light: #0d2e22;
      --c-S: #60a5fa;
      --c-S-light: #0f2240;
      --c-dash: #fb923c;
      --c-dash-light: #2c1503;
    }

    /* ───────────────────────────────
       LEFT PANEL — CHECKLIST
    ─────────────────────────────── */
    .checklist-panel {
      width: 40%;
      background: #1a1d27;
      border-right: 1px solid #2a2d3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .checklist-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .notes-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      border-top: 1px solid #2a2d3a;
    }

    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2d3a;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5563;
      margin-bottom: 12px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .add-row input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #0f1117;
      color: #e5e7eb;
    }

    .add-row input[type="text"]::placeholder { color: #4b5563; }

    .add-row input[type="text"]:focus {
      border-color: #3f4459;
      background: #0f1117;
    }

    .cat-btns {
      display: flex;
      gap: 4px;
    }

    .cat-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-btn[data-cat="M"] { background: var(--c-M-light); color: var(--c-M); }
    .cat-btn[data-cat="B"] { background: var(--c-B-light); color: var(--c-B); }
    .cat-btn[data-cat="S"] { background: var(--c-S-light); color: var(--c-S); }
    .cat-btn[data-cat="-"] { background: var(--c-dash-light); color: var(--c-dash); }

    .cat-btn.active[data-cat="M"] { border-color: var(--c-M); }
    .cat-btn.active[data-cat="B"] { border-color: var(--c-B); }
    .cat-btn.active[data-cat="S"] { border-color: var(--c-S); }
    .cat-btn.active[data-cat="-"] { border-color: var(--c-dash); }

    .add-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: #3f4459;
      color: #f3f4f6;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .add-btn:hover { background: #555c77; }

    .checklist-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .checklist-items:empty::after {
      content: 'Add items above';
      display: block;
      text-align: center;
      color: #374151;
      font-size: 13px;
      margin-top: 40px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 8px;
      border-radius: 7px;
      margin-bottom: 2px;
      transition: background 0.1s;
    }

    .checklist-item:hover { background: #222636; }

    .checklist-item input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #60a5fa;
      flex-shrink: 0;
    }

    .item-badge {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-badge[data-cat="M"] { background: var(--c-M-light); color: var(--c-M); }
    .item-badge[data-cat="B"] { background: var(--c-B-light); color: var(--c-B); }
    .item-badge[data-cat="S"] { background: var(--c-S-light); color: var(--c-S); }
    .item-badge[data-cat="-"] { background: var(--c-dash-light); color: var(--c-dash); }

    .item-text {
      flex: 1;
      font-size: 13.5px;
      line-height: 1.4;
      color: #d1d5db;
      transition: color 0.15s;
    }

    .checklist-item.done .item-text {
      text-decoration: line-through;
      color: #4b5563;
    }

    .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #4b5563;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      transition: opacity 0.1s, color 0.1s;
    }

    .checklist-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ef4444; }

    /* ───────────────────────────────
       NOTES SECTION
    ─────────────────────────────── */
    .notes-toolbar {
      padding: 16px 20px 10px;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .notes-toolbar .panel-title { margin-bottom: 0; }

    .notes-mode-btns {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .notes-mode-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #2a2d3a;
      background: transparent;
      color: #6b7280;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }

    .notes-mode-btn.active {
      background: #2a2d3a;
      color: #d1d5db;
    }

    .notes-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }

    .notes-textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.6;
      color: #d1d5db;
      caret-color: #60a5fa;
    }

    .notes-textarea::placeholder { color: #374151; }

    .notes-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .notes-bullet-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
    }

    .notes-bullet-item::before {
      content: '•';
      color: #4b5563;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .notes-bullet-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.6;
      color: #d1d5db;
      caret-color: #60a5fa;
      padding: 0;
    }

    .notes-bullet-input::placeholder { color: #374151; }

    /* ───────────────────────────────
       RIGHT PANEL — TIME BLOCKS
    ─────────────────────────────── */
    .planner-panel {
      width: 60%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f1117;
    }

    .planner-toolbar {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2d3a;
      background: #1a1d27;
    }

    .planner-toolbar .panel-title { margin-bottom: 12px; }

    .cat-btns-planner {
      display: flex;
      gap: 6px;
    }

    .cat-btn-planner {
      padding: 5px 12px;
      border-radius: 6px;
      border: 2px solid transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }

    .cat-btn-planner[data-cat="M"] { background: var(--c-M-light); color: var(--c-M); }
    .cat-btn-planner[data-cat="B"] { background: var(--c-B-light); color: var(--c-B); }
    .cat-btn-planner[data-cat="S"] { background: var(--c-S-light); color: var(--c-S); }
    .cat-btn-planner[data-cat="-"] { background: var(--c-dash-light); color: var(--c-dash); }

    .cat-btn-planner.active[data-cat="M"] { border-color: var(--c-M); }
    .cat-btn-planner.active[data-cat="B"] { border-color: var(--c-B); }
    .cat-btn-planner.active[data-cat="S"] { border-color: var(--c-S); }
    .cat-btn-planner.active[data-cat="-"] { border-color: var(--c-dash); }

    .planner-hint {
      font-size: 11px;
      color: #4b5563;
      margin-left: auto;
      align-self: center;
    }

    .planner-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 24px 8px;
    }

    .timeline {
      position: relative;
      margin-left: 52px;
      user-select: none;
    }

    .slot {
      position: absolute;
      left: 0;
      right: 0;
      height: 48px;
      border-top: 1px solid #2a2d3a;
    }

    .slot.half { border-top: 1px dashed #1e2130; }

    .slot-label {
      position: absolute;
      left: -52px;
      top: -8px;
      font-size: 11px;
      color: #4b5563;
      width: 46px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* bottom border for last slot */
    .timeline-end {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid #2a2d3a;
    }

    /* drag ghost */
    .drag-ghost {
      position: absolute;
      left: 0;
      right: 0;
      border-radius: 6px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 5;
    }

    /* time blocks */
    .time-block {
      position: absolute;
      left: 2px;
      right: 2px;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      z-index: 10;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: filter 0.1s;
    }

    .time-block:hover { filter: brightness(0.95); }

    .time-block[data-cat="M"] { background: var(--c-M-light); color: var(--c-M); border-left: 3px solid var(--c-M); }
    .time-block[data-cat="B"] { background: var(--c-B-light); color: var(--c-B); border-left: 3px solid var(--c-B); }
    .time-block[data-cat="S"] { background: var(--c-S-light); color: var(--c-S); border-left: 3px solid var(--c-S); }
    .time-block[data-cat="-"] { background: var(--c-dash-light); color: var(--c-dash); border-left: 3px solid var(--c-dash); }

    .block-label {
      flex: 1;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .block-time {
      font-size: 10px;
      opacity: 0.65;
      margin-top: 1px;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      cursor: s-resize;
      border-radius: 0 0 6px 6px;
    }

    /* ── POPOVER ── */
    .popover {
      position: fixed;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 100;
      min-width: 200px;
      display: none;
    }

    .popover.open { display: block; }

    .popover-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }

    .popover input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #2a2d3a;
      border-radius: 5px;
      font-size: 12px;
      outline: none;
      background: #0f1117;
      color: #e5e7eb;
    }

    .popover input[type="text"]::placeholder { color: #4b5563; }
    .popover input[type="text"]:focus { border-color: #3f4459; }

    .popover .cat-btns-pop {
      display: flex;
      gap: 4px;
    }

    .cat-btn-pop {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: 2px solid transparent;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-btn-pop[data-cat="M"] { background: var(--c-M-light); color: var(--c-M); }
    .cat-btn-pop[data-cat="B"] { background: var(--c-B-light); color: var(--c-B); }
    .cat-btn-pop[data-cat="S"] { background: var(--c-S-light); color: var(--c-S); }
    .cat-btn-pop[data-cat="-"] { background: var(--c-dash-light); color: var(--c-dash); }

    .cat-btn-pop.active[data-cat="M"] { border-color: var(--c-M); }
    .cat-btn-pop.active[data-cat="B"] { border-color: var(--c-B); }
    .cat-btn-pop.active[data-cat="S"] { border-color: var(--c-S); }
    .cat-btn-pop.active[data-cat="-"] { border-color: var(--c-dash); }

    .popover-delete {
      width: 100%;
      padding: 5px;
      border: 1px solid #4a1a1a;
      border-radius: 5px;
      background: #2a1010;
      color: #f87171;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .popover-delete:hover { background: #3a1515; }
  </style>
</head>
<body>

<header>
  <h1>Daily Planner</h1>
  <span class="date" id="header-date"></span>
</header>

<div class="app">

  <!-- ── LEFT: CHECKLIST + NOTES ── -->
  <div class="checklist-panel">

    <!-- top half: checklist -->
    <div class="checklist-half">
      <div class="panel-header">
        <div class="panel-title">Checklist</div>
        <div class="add-row">
          <input type="text" id="checklist-input" placeholder="Add a task…" />
          <div class="cat-btns" id="checklist-cats">
            <button class="cat-btn active" data-cat="M">M</button>
            <button class="cat-btn" data-cat="B">B</button>
            <button class="cat-btn" data-cat="S">S</button>
            <button class="cat-btn" data-cat="-">—</button>
          </div>
          <button class="add-btn" id="add-item-btn">+</button>
        </div>
      </div>
      <div class="checklist-items" id="checklist-items"></div>
    </div>

    <!-- bottom half: notes -->
    <div class="notes-half">
      <div class="notes-toolbar">
        <div class="panel-title">Notes</div>
        <div class="notes-mode-btns">
          <button class="notes-mode-btn active" id="notes-free-btn">Free</button>
          <button class="notes-mode-btn" id="notes-bullet-btn">Bullets</button>
        </div>
      </div>
      <div class="notes-body" id="notes-body">
        <textarea class="notes-textarea" id="notes-textarea" placeholder="Write anything…"></textarea>
      </div>
    </div>

  </div>

  <!-- ── RIGHT: TIME BLOCK PLANNER ── -->
  <div class="planner-panel">
    <div class="planner-toolbar">
      <div class="panel-title">Time Blocks — 8 AM to 6 PM</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="cat-btns-planner" id="planner-cats">
          <button class="cat-btn-planner active" data-cat="M">M</button>
          <button class="cat-btn-planner" data-cat="B">B</button>
          <button class="cat-btn-planner" data-cat="S">S</button>
          <button class="cat-btn-planner" data-cat="-">—</button>
        </div>
        <span class="planner-hint">Drag to create a block</span>
      </div>
    </div>
    <div class="planner-scroll">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

</div>

<!-- Popover for block editing -->
<div class="popover" id="block-popover">
  <div class="popover-row">
    <input type="text" id="popover-label" placeholder="Label…" />
  </div>
  <div class="popover-row">
    <div class="cat-btns-pop" id="popover-cats">
      <button class="cat-btn-pop" data-cat="M">M</button>
      <button class="cat-btn-pop" data-cat="B">B</button>
      <button class="cat-btn-pop" data-cat="S">S</button>
      <button class="cat-btn-pop" data-cat="-">—</button>
    </div>
  </div>
  <button class="popover-delete" id="popover-delete">Delete block</button>
</div>

<script>
  // ── Constants ──
  const START_HOUR = 8;
  const END_HOUR = 18;
  const TOTAL_MINS = (END_HOUR - START_HOUR) * 60; // 600
  const SNAP = 15; // minutes

  // Compute SLOT_HEIGHT so that 9:00–17:00 (480 mins) always fits in the scroll area
  function computeSlotHeight() {
    const scroll = document.querySelector('.planner-scroll');
    const available = scroll.clientHeight - 40; // subtract padding
    const visibleMins = (17 - 9) * 60; // 480 mins (9am–5pm)
    const pxPerMin = available / visibleMins;
    return Math.max(pxPerMin * 30, 24); // px per 30-min slot, min 24px
  }

  let SLOT_HEIGHT = 48;
  let PX_PER_MIN = SLOT_HEIGHT / 30;

  // ── State ──
  let checklistItems = [];
  let timeBlocks = [];
  let checklistCat = 'M';
  let plannerCat = 'M';
  let nextId = 1;

  // ── Drag state ──
  let dragging = false;
  let dragStartMin = 0;
  let dragCurMin = 0;
  let ghostEl = null;

  // ── Resize state ──
  let resizing = false;
  let resizeBlockId = null;
  let resizeStartY = 0;
  let resizeOrigEndMin = 0;

  // ── Popover state ──
  let popoverBlockId = null;

  // ── DOM refs ──
  const timeline = document.getElementById('timeline');
  const checklistInput = document.getElementById('checklist-input');
  const checklistItemsEl = document.getElementById('checklist-items');
  const popover = document.getElementById('block-popover');
  const popoverLabel = document.getElementById('popover-label');

  // ── Date header ──
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  // ── Build timeline slots ──
  function buildTimeline() {
    timeline.innerHTML = '';
    const slots = TOTAL_MINS / 30; // 16
    for (let i = 0; i < slots; i++) {
      const div = document.createElement('div');
      div.className = 'slot' + (i % 2 === 1 ? ' half' : '');
      div.style.top = (i * SLOT_HEIGHT) + 'px';

      if (i % 2 === 0) {
        const label = document.createElement('span');
        label.className = 'slot-label';
        const totalMins = START_HOUR * 60 + i * 30;
        label.textContent = formatAxisLabel(totalMins);
        div.appendChild(label);
      }

      timeline.appendChild(div);
    }
    // bottom border
    const end = document.createElement('div');
    end.className = 'timeline-end';
    timeline.appendChild(end);
    // label for 5pm
    const endLabel = document.createElement('span');
    endLabel.className = 'slot-label';
    endLabel.style.cssText = `position:absolute;left:-52px;bottom:-8px;font-size:11px;color:#4b5563;width:46px;text-align:right;`;
    endLabel.textContent = '6:00';
    timeline.appendChild(endLabel);
  }

  function formatTime(absoluteMins) {
    const h = Math.floor(absoluteMins / 60);
    const m = absoluteMins % 60;
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h % 12 || 12;
    return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
  }

  function formatAxisLabel(absoluteMins) {
    const h = Math.floor(absoluteMins / 60);
    const m = absoluteMins % 60;
    const h12 = h % 12 || 12;
    return `${h12}:${m.toString().padStart(2, '0')}`;
  }

  function minsToOffset(mins) { // mins from 9am → px
    return mins * PX_PER_MIN;
  }

  function yToMins(y) { // px in timeline → mins from 9am, snapped
    const raw = y / PX_PER_MIN;
    return Math.round(raw / SNAP) * SNAP;
  }

  // ── Render time blocks ──
  function renderBlocks() {
    document.querySelectorAll('.time-block').forEach(el => el.remove());
    timeBlocks.forEach(block => {
      const el = document.createElement('div');
      el.className = 'time-block';
      el.dataset.cat = block.category;
      el.dataset.id = block.id;
      el.style.top = minsToOffset(block.startMin) + 'px';
      el.style.height = Math.max(minsToOffset(block.endMin - block.startMin), 20) + 'px';

      const labelEl = document.createElement('div');
      labelEl.className = 'block-label';
      labelEl.textContent = block.label || block.category;

      const timeEl = document.createElement('div');
      timeEl.className = 'block-time';
      timeEl.textContent = formatTime(START_HOUR * 60 + block.startMin) + ' – ' + formatTime(START_HOUR * 60 + block.endMin);

      const handle = document.createElement('div');
      handle.className = 'resize-handle';

      el.appendChild(labelEl);
      el.appendChild(timeEl);
      el.appendChild(handle);
      timeline.appendChild(el);

      // click to open popover
      el.addEventListener('mousedown', (e) => {
        if (e.target === handle) return; // handled by resize
        e.stopPropagation();
        openPopover(block.id, e);
      });

      // resize handle
      handle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        resizing = true;
        resizeBlockId = block.id;
        resizeStartY = e.clientY;
        resizeOrigEndMin = block.endMin;
        closePopover();
      });
    });
  }

  // ── Checklist ──
  function renderChecklist() {
    checklistItemsEl.innerHTML = '';
    checklistItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'checklist-item' + (item.done ? ' done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.done;
      cb.addEventListener('change', () => {
        item.done = cb.checked;
        renderChecklist();
      });

      const badge = document.createElement('span');
      badge.className = 'item-badge';
      badge.dataset.cat = item.category;
      badge.textContent = item.category;

      const text = document.createElement('span');
      text.className = 'item-text';
      text.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.addEventListener('click', () => {
        checklistItems = checklistItems.filter(i => i.id !== item.id);
        renderChecklist();
      });

      row.appendChild(cb);
      row.appendChild(badge);
      row.appendChild(text);
      row.appendChild(del);
      checklistItemsEl.appendChild(row);
    });
  }

  function addChecklistItem() {
    const text = checklistInput.value.trim();
    if (!text) return;
    checklistItems.push({ id: nextId++, text, category: checklistCat, done: false });
    checklistInput.value = '';
    renderChecklist();
  }

  document.getElementById('add-item-btn').addEventListener('click', addChecklistItem);
  checklistInput.addEventListener('keydown', e => { if (e.key === 'Enter') addChecklistItem(); });

  document.getElementById('checklist-cats').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    checklistCat = btn.dataset.cat;
    document.querySelectorAll('#checklist-cats .cat-btn').forEach(b => b.classList.toggle('active', b === btn));
  });

  // ── Planner category ──
  document.getElementById('planner-cats').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn-planner');
    if (!btn) return;
    plannerCat = btn.dataset.cat;
    document.querySelectorAll('#planner-cats .cat-btn-planner').forEach(b => b.classList.toggle('active', b === btn));
  });

  // ── Timeline drag to create ──
  timeline.addEventListener('mousedown', e => {
    if (e.target.closest('.time-block')) return;
    closePopover();
    const rect = timeline.getBoundingClientRect();
    const y = e.clientY - rect.top;
    dragStartMin = Math.max(0, Math.min(yToMins(y), TOTAL_MINS));
    dragCurMin = dragStartMin;
    dragging = true;

    ghostEl = document.createElement('div');
    ghostEl.className = 'drag-ghost';
    ghostEl.dataset.cat = plannerCat;
    ghostEl.style.background = getCatColor(plannerCat);
    ghostEl.style.top = minsToOffset(dragStartMin) + 'px';
    ghostEl.style.height = '0px';
    timeline.appendChild(ghostEl);

    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (dragging && ghostEl) {
      const rect = timeline.getBoundingClientRect();
      const y = e.clientY - rect.top;
      dragCurMin = Math.max(0, Math.min(yToMins(y), TOTAL_MINS));

      const top = minsToOffset(Math.min(dragStartMin, dragCurMin));
      const height = minsToOffset(Math.abs(dragCurMin - dragStartMin));
      ghostEl.style.top = top + 'px';
      ghostEl.style.height = height + 'px';
    }

    if (resizing && resizeBlockId !== null) {
      const block = timeBlocks.find(b => b.id === resizeBlockId);
      if (!block) return;
      const rect = timeline.getBoundingClientRect();
      const dy = e.clientY - resizeStartY;
      const deltaMins = Math.round((dy / PX_PER_MIN) / SNAP) * SNAP;
      const newEnd = Math.max(block.startMin + SNAP, Math.min(TOTAL_MINS, resizeOrigEndMin + deltaMins));
      block.endMin = newEnd;
      renderBlocks();
    }
  });

  document.addEventListener('mouseup', e => {
    if (dragging) {
      dragging = false;
      if (ghostEl) { ghostEl.remove(); ghostEl = null; }

      const start = Math.min(dragStartMin, dragCurMin);
      const end = Math.max(dragStartMin, dragCurMin);
      if (end - start >= SNAP) {
        timeBlocks.push({ id: nextId++, startMin: start, endMin: end, category: plannerCat, label: '' });
        renderBlocks();
      }
    }

    if (resizing) {
      resizing = false;
      resizeBlockId = null;
    }
  });

  // ── Popover ──
  function openPopover(blockId, e) {
    popoverBlockId = blockId;
    const block = timeBlocks.find(b => b.id === blockId);
    if (!block) return;

    popoverLabel.value = block.label || '';

    document.querySelectorAll('#popover-cats .cat-btn-pop').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === block.category);
    });

    popover.classList.add('open');

    // position near click
    const x = Math.min(e.clientX + 8, window.innerWidth - 230);
    const y = Math.min(e.clientY + 8, window.innerHeight - 160);
    popover.style.left = x + 'px';
    popover.style.top = y + 'px';
  }

  function closePopover() {
    popover.classList.remove('open');
    popoverBlockId = null;
  }

  popoverLabel.addEventListener('input', () => {
    const block = timeBlocks.find(b => b.id === popoverBlockId);
    if (!block) return;
    block.label = popoverLabel.value;
    renderBlocks();
  });

  document.getElementById('popover-cats').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn-pop');
    if (!btn) return;
    const block = timeBlocks.find(b => b.id === popoverBlockId);
    if (!block) return;
    block.category = btn.dataset.cat;
    document.querySelectorAll('#popover-cats .cat-btn-pop').forEach(b => {
      b.classList.toggle('active', b === btn);
    });
    renderBlocks();
  });

  document.getElementById('popover-delete').addEventListener('click', () => {
    timeBlocks = timeBlocks.filter(b => b.id !== popoverBlockId);
    closePopover();
    renderBlocks();
  });

  document.addEventListener('mousedown', e => {
    if (!popover.contains(e.target) && !e.target.closest('.time-block')) {
      closePopover();
    }
  });

  // ── Helpers ──
  function getCatColor(cat) {
    return { M: '#fce7f3', B: '#d1fae5', S: '#dbeafe', '-': '#e5e7eb' }[cat] || '#e5e7eb';
  }

  // ── Notes ──
  let notesMode = 'free'; // 'free' | 'bullets'
  let bulletItems = [''];

  const notesBody = document.getElementById('notes-body');
  const notesTextarea = document.getElementById('notes-textarea');
  const notesFreeBtn = document.getElementById('notes-free-btn');
  const notesBulletBtn = document.getElementById('notes-bullet-btn');

  function renderBullets() {
    notesBody.innerHTML = '';
    const ul = document.createElement('ul');
    ul.className = 'notes-bullets';

    bulletItems.forEach((text, i) => {
      const li = document.createElement('li');
      li.className = 'notes-bullet-item';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'notes-bullet-input';
      inp.value = text;
      inp.placeholder = i === 0 ? 'Add a bullet…' : '';

      inp.addEventListener('input', () => { bulletItems[i] = inp.value; });

      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          bulletItems.splice(i + 1, 0, '');
          renderBullets();
          const inputs = notesBody.querySelectorAll('.notes-bullet-input');
          if (inputs[i + 1]) inputs[i + 1].focus();
        } else if (e.key === 'Backspace' && inp.value === '' && bulletItems.length > 1) {
          e.preventDefault();
          bulletItems.splice(i, 1);
          renderBullets();
          const inputs = notesBody.querySelectorAll('.notes-bullet-input');
          const prev = inputs[Math.max(0, i - 1)];
          if (prev) { prev.focus(); prev.setSelectionRange(prev.value.length, prev.value.length); }
        }
      });

      li.appendChild(inp);
      ul.appendChild(li);
    });

    notesBody.appendChild(ul);
  }

  notesFreeBtn.addEventListener('click', () => {
    notesMode = 'free';
    notesFreeBtn.classList.add('active');
    notesBulletBtn.classList.remove('active');
    notesBody.innerHTML = '';
    notesBody.appendChild(notesTextarea);
    notesTextarea.focus();
  });

  notesBulletBtn.addEventListener('click', () => {
    notesMode = 'bullets';
    notesBulletBtn.classList.add('active');
    notesFreeBtn.classList.remove('active');
    if (bulletItems.length === 0) bulletItems = [''];
    renderBullets();
    const first = notesBody.querySelector('.notes-bullet-input');
    if (first) first.focus();
  });

  // ── Init ──
  function init() {
    SLOT_HEIGHT = computeSlotHeight();
    PX_PER_MIN = SLOT_HEIGHT / 30;
    timeline.style.height = (TOTAL_MINS * PX_PER_MIN) + 'px';
    buildTimeline();
    renderBlocks();
    // Scroll so 9am is at the top
    const scroll = document.querySelector('.planner-scroll');
    scroll.scrollTop = (9 - START_HOUR) * 60 * PX_PER_MIN;
  }

  init();
  renderChecklist();
  window.addEventListener('resize', init);
</script>
</body>
</html>
